<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Thank you</title>
  <link rel="stylesheet" href="styles.css?v=20260204a">
  <style>
    body { background: var(--background-color); }
    .thankyou-wrap { max-width: 820px; margin: 26px auto; padding: 0 16px; }
    .thankyou-card { background: #fff; border-radius: 16px; padding: 22px; box-shadow: 0 6px 20px rgba(0,0,0,0.08); }
    .thankyou-title { margin: 0 0 10px; font-size: 22px; }
    .thankyou-title.ok { color: var(--top-bar-color); }
    .thankyou-title.bad { color: var(--highlight-color); }
    .thankyou-meta { margin-top: 10px; color: #555; }
    .thankyou-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }
    .thankyou-actions a { display: inline-flex; align-items: center; justify-content: center; padding: 10px 14px; border-radius: 10px; text-decoration: none; font-weight: 700; }
    .btn-primary { background: var(--highlight-color); color: #fff; }
    .btn-secondary { background: #ecf0f1; color: #2c3e50; }
    code { background: #f0f0f0; padding: 2px 6px; border-radius: 6px; }
    .items-box { margin-top: 16px; background: #f8f9fa; border-radius: 12px; padding: 14px; }
    .items-title { margin: 0 0 10px; font-size: 15px; font-weight: 800; color: #2c3e50; }
    .items-row { display:flex; justify-content:space-between; gap: 12px; padding: 8px 0; border-bottom: 1px solid #e5e7eb; }
    .items-row:last-child { border-bottom: none; }
    .items-name { font-weight: 700; color:#333; }
    .items-sub { color:#666; font-size: 13px; margin-top: 2px; }
    .items-note { color: var(--highlight-color); font-size: 13px; margin-top: 6px; white-space: pre-line; font-weight: 800; }
    .order-note-box { margin-top: 12px; padding: 12px; border-radius: 12px; background: #fff5f5; border: 1px solid #f0b4b4; }
    .order-note-title { font-weight: 900; color: var(--highlight-color); margin-bottom: 6px; }
    .order-note-text { color: var(--highlight-color); font-weight: 800; white-space: pre-line; }
    .items-price { font-weight: 800; color:#111; white-space: nowrap; }
    .contact-box { margin-top: 14px; color:#444; }
    .contact-box a { color: var(--highlight-color); text-decoration: none; font-weight: 800; }

    .top-actions { display:flex; align-items:center; justify-content:flex-end; gap: 10px; }
    .top-actions a { display:inline-flex; align-items:center; justify-content:center; padding: 8px 12px; border-radius: 10px; text-decoration:none; font-weight: 800; }
  </style>
</head>
<body>
  <div class="top-bar">
    <div class="container" style="display:flex; align-items:center; justify-content:space-between;">
      <div class="logo"><h1 style="margin:0;">Bojole</h1></div>
      <div class="top-actions">
        <a id="ty-track-top" class="btn-secondary" href="#" style="display:none;">Track order</a>
      </div>
    </div>
  </div>

  <div class="thankyou-wrap">
    <div class="thankyou-card">
      <h1 id="ty-title" class="thankyou-title">Thank you!</h1>
      <div id="ty-text">Your payment is being processed.</div>
      <div id="ty-summary" class="thankyou-meta" style="display:none;"></div>
      <div class="thankyou-meta">
        <div>Order: <code id="ty-order">—</code></div>
        <div id="ty-code-row">Code: <code id="ty-code">—</code></div>
      </div>

      <div id="ty-items" class="items-box" style="display:none;"></div>
      <div id="ty-contact" class="contact-box" style="display:none;"></div>

      <div class="thankyou-actions">
        <a id="ty-menu" class="btn-primary" href="/">Back to menu</a>
        <a id="ty-track" class="btn-secondary" href="#" style="display:none;">Track order</a>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const LANGUAGE_STORAGE_KEY = 'language';
      const LANGUAGE_USER_SELECTED_KEY = 'language_user_selected_v1';

      function getBasePath() {
        return window.location.pathname.includes('/resturant-website') ? '/resturant-website' : '';
      }

      function getInitialLanguage() {
        try {
          const stored = (localStorage.getItem(LANGUAGE_STORAGE_KEY) || '').toString().trim().toLowerCase();
          const storedValid = (stored === 'en' || stored === 'bg') ? stored : '';
          const userSelected = localStorage.getItem(LANGUAGE_USER_SELECTED_KEY) === '1';
          if (!userSelected) return 'bg';
          return storedValid || 'bg';
        } catch (e) {
          return 'bg';
        }
      }

      const lang = getInitialLanguage();
      document.documentElement.lang = lang;

      let eurToBgnRate = null;
      let currencyPromise = null;

      const i18n = {
        en: {
          thankYou: 'Thank you!',
          thankYouOrderPlaced: 'Thank you! Order placed',
          thankYouPaymentOk: 'Thank you! Payment successful',
          paymentFailed: 'Payment failed',
          orderFailed: 'Order failed',
          processingPayment: 'Your payment is being processed.',
          processingOrder: 'Your order is being processed.',
          placedOk: 'Your order has been placed successfully.',
          failedCard: 'Your payment was not completed. You can try again from checkout.',
          failedCash: 'Your order could not be completed. You can try again from checkout.',
          orderLabel: 'Order',
          codeLabel: 'Code',
          backToMenu: 'Back to menu',
          trackOrder: 'Track order',
          hello: 'Hello',
          deliveryTo: 'Delivery to',
          pickup: 'Pickup',
          itemsTitle: 'Ordered items',
          total: 'Total',
          phone: 'Phone',
          promo: 'Promo',
          subtotal: 'Subtotal',
          discount: 'Discount',
          deliveryFee: 'Delivery fee',
          orderNote: 'Order note'
        },
        bg: {
          thankYou: 'Благодарим!',
          thankYouOrderPlaced: 'Благодарим! Поръчката е приета',
          thankYouPaymentOk: 'Благодарим! Плащането е успешно',
          paymentFailed: 'Неуспешно плащане',
          orderFailed: 'Неуспешна поръчка',
          processingPayment: 'Плащането се обработва.',
          processingOrder: 'Поръчката се обработва.',
          placedOk: 'Поръчката е приета успешно.',
          failedCard: 'Плащането не беше завършено. Можете да опитате отново от плащането.',
          failedCash: 'Поръчката не можа да бъде завършена. Можете да опитате отново.',
          orderLabel: 'Поръчка',
          codeLabel: 'Код',
          backToMenu: 'Обратно към менюто',
          trackOrder: 'Проследи поръчка',
          hello: 'Здравейте',
          deliveryTo: 'Доставка до',
          pickup: 'Взимане от място',
          itemsTitle: 'Поръчани продукти',
          total: 'Общо',
          phone: 'Телефон',
          promo: 'Промо',
          subtotal: 'Сума',
          discount: 'Отстъпка',
          deliveryFee: 'Доставка',
          orderNote: 'Бележка към поръчката'
        }
      };

      function t(key) {
        return (i18n[lang] && i18n[lang][key]) || (i18n.en && i18n.en[key]) || key;
      }

      function toNumber(val) {
        const n = Number(val);
        return Number.isFinite(n) ? n : 0;
      }

      function round2(val) {
        const n = toNumber(val);
        return Math.round((n + Number.EPSILON) * 100) / 100;
      }

      function escapeHtml(value) {
        return String(value ?? '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function convertBgnToEur(amountBgn) {
        const rate = toNumber(eurToBgnRate);
        if (rate > 0) return toNumber(amountBgn) / rate;
        // Fallback: assume already in EUR if rate missing
        return toNumber(amountBgn);
      }

      function formatMoney(amount, currency) {
        const cur = (currency || '').toString().trim().toUpperCase();
        if (cur === 'BGN') return `${round2(convertBgnToEur(amount)).toFixed(2)} €`;
        return `${round2(amount).toFixed(2)} €`;
      }

      async function fetchJson(url) {
        const res = await fetch(url);
        if (!res.ok) throw new Error('Request failed');
        return await res.json();
      }

      function loadCurrency() {
        if (currencyPromise) return currencyPromise;
        currencyPromise = (async () => {
          try {
            const base = getBasePath();
            const cur = await fetchJson(`${base}/api/settings/currency`);
            eurToBgnRate = cur && (cur.eurToBgnRate != null ? cur.eurToBgnRate : null);
          } catch (e) {
            eurToBgnRate = null;
          }
        })();
        return currencyPromise;
      }

      async function loadContacts() {
        try {
          const base = getBasePath();
          const settings = await fetchJson(`${base}/api/settings/site`);
          const phone = (settings?.footer?.contacts?.phone || '').toString().trim();
          if (!phone) return;
          const mount = document.getElementById('ty-contact');
          if (!mount) return;
          mount.style.display = '';
          mount.innerHTML = `${t('phone')}: <a href="tel:${encodeURIComponent(phone)}">${phone}</a>`;
        } catch (e) {
          // ignore
        }
      }

      async function loadItems(orderId) {
        try {
          await loadCurrency();
          const base = getBasePath();
          const data = await fetchJson(`${base}/api/orders/track/${encodeURIComponent(orderId)}`);
          const o = data?.order;
          const items = Array.isArray(o?.items) ? o.items : [];
          if (!items.length) return;

          const currency = o?.currency || 'EUR';

          const mount = document.getElementById('ty-items');
          if (!mount) return;

          const rows = items.map((it) => {
            const name = escapeHtml((it?.name || '').toString());
            const note = ((it?.note || '').toString().replace(/\r/g, '').trim());
            const noteHtml = note ? `<div class="items-note">${escapeHtml(note)}</div>` : '';
            const qty = Number(it?.quantity || 0);
            const price = Number(it?.price || 0);
            const originalPrice = Number(it?.originalPrice);
            const hasDiscount = Number.isFinite(originalPrice) && originalPrice > price;
            const lineTotal = price * qty;

            const unitHtml = hasDiscount
              ? `<span style="text-decoration: line-through; opacity: .75; margin-right: 6px;">${formatMoney(originalPrice, currency)}</span><strong>${formatMoney(price, currency)}</strong>`
              : `${formatMoney(price, currency)}`;

            return `
              <div class="items-row">
                <div>
                  <div class="items-name">${name}</div>
                  <div class="items-sub">${qty} × ${unitHtml}</div>
                  ${noteHtml}
                </div>
                <div class="items-price">${formatMoney(lineTotal, currency)}</div>
              </div>
            `;
          }).join('');

          const subtotal = toNumber(o?.subtotal);
          const discountAmount = toNumber(o?.discountAmount);
          const deliveryFee = toNumber(o?.deliveryFee);
          const total = toNumber(o?.total);
          const promoCode = (o?.promoCode || '').toString().trim();
          const discountPct = Math.max(0, Math.min(100, toNumber(o?.discount)));
          const orderNote = (o?.orderNote || '').toString().replace(/\r/g, '').trim();

          const promoLine = promoCode ? `${escapeHtml(promoCode)}${discountPct ? ` (-${escapeHtml(discountPct)}%)` : ''}` : '';

          mount.style.display = '';
          mount.innerHTML = `
            <div class="items-title">${t('itemsTitle')}</div>
            ${rows}
            ${(promoLine || discountAmount > 0) ? `
              <div class="items-row">
                <div class="items-name">${t('promo')}</div>
                <div class="items-price">${promoLine || (discountPct ? `-${discountPct}%` : '—')}</div>
              </div>
            ` : ''}
            ${(subtotal > 0) ? `
              <div class="items-row">
                <div class="items-name">${t('subtotal')}</div>
                <div class="items-price">${formatMoney(subtotal, currency)}</div>
              </div>
            ` : ''}
            ${(discountAmount > 0) ? `
              <div class="items-row">
                <div class="items-name">${t('discount')}</div>
                <div class="items-price">-${formatMoney(discountAmount, currency)}</div>
              </div>
            ` : ''}
            ${(deliveryFee > 0) ? `
              <div class="items-row">
                <div class="items-name">${t('deliveryFee')}</div>
                <div class="items-price">${formatMoney(deliveryFee, currency)}</div>
              </div>
            ` : ''}
            <div class="items-row">
              <div class="items-name">${t('total')}</div>
              <div class="items-price">${formatMoney(total, currency)}</div>
            </div>
            ${orderNote ? `
              <div class="order-note-box">
                <div class="order-note-title">${t('orderNote')}</div>
                <div class="order-note-text">${escapeHtml(orderNote)}</div>
              </div>
            ` : ''}
          `;

          // Email-like summary (customer + delivery)
          const summary = document.getElementById('ty-summary');
          if (summary) {
            const customerName = (o?.customerInfo?.name || '').toString().trim();
            const address = (o?.customerInfo?.address || '').toString().trim();
            const city = (o?.customerInfo?.city || '').toString().trim();
            const place = [address, city].filter(Boolean).join(', ');
            const deliveryText = (o?.deliveryMethod === 'delivery')
              ? `${t('deliveryTo')}: ${place || '—'}`
              : t('pickup');
            summary.style.display = '';
            summary.innerHTML = `
              <div>${customerName ? `${t('hello')}, <strong>${escapeHtml(customerName)}</strong>` : `${t('hello')},`}</div>
              <div style="margin-top:6px; color:#555;">${escapeHtml(deliveryText)}</div>
            `;
          }
        } catch (e) {
          // ignore
        }
      }

      const base = getBasePath();
      const params = new URLSearchParams(window.location.search);
      const order = (params.get('order') || '').trim();
      const status = (params.get('status') || '').trim().toLowerCase();
      const code = (params.get('code') || '').trim();
      const payment = (params.get('payment') || '').trim().toLowerCase();

      const isCash = payment === 'cash' || (status === 'success' && !code);
      const isCard = payment === 'card' || !!code;

      document.getElementById('ty-menu').setAttribute('href', base + '/');
      document.getElementById('ty-menu').textContent = t('backToMenu');
      document.getElementById('ty-track').textContent = t('trackOrder');
      document.getElementById('ty-track-top').textContent = t('trackOrder');

      if (order) {
        document.getElementById('ty-order').textContent = order;
        const trackHref = base + '/track-order.html?id=' + encodeURIComponent(order);
        const trackBtn = document.getElementById('ty-track');
        const trackTop = document.getElementById('ty-track-top');
        if (trackBtn) {
          trackBtn.style.display = '';
          trackBtn.setAttribute('href', trackHref);
        }
        if (trackTop) {
          trackTop.style.display = '';
          trackTop.setAttribute('href', trackHref);
        }
        loadItems(order);
      } else {
        document.getElementById('ty-track').style.display = 'none';
        document.getElementById('ty-track-top').style.display = 'none';
      }

      loadContacts();

      const codeRow = document.getElementById('ty-code-row');
      if (isCash) {
        if (codeRow) codeRow.style.display = 'none';
      } else {
        if (codeRow) codeRow.style.display = '';
        document.getElementById('ty-code').textContent = code || '—';
      }

      // Translate static labels
      try {
        const meta = document.querySelector('.thankyou-meta');
        if (meta) {
          meta.querySelector('div:nth-child(1)').childNodes[0].textContent = t('orderLabel') + ': ';
          if (codeRow) codeRow.childNodes[0].textContent = t('codeLabel') + ': ';
        }
      } catch (e) {}

      const title = document.getElementById('ty-title');
      const text = document.getElementById('ty-text');

      if (status === 'success') {
        title.textContent = isCash ? t('thankYouOrderPlaced') : t('thankYouPaymentOk');
        title.classList.add('ok');
        text.textContent = t('placedOk');
        try {
          localStorage.removeItem('cart');
          localStorage.removeItem('checkoutState_v1');
        } catch (e) {}
      } else if (status === 'failed') {
        title.textContent = isCard ? t('paymentFailed') : t('orderFailed');
        title.classList.add('bad');
        text.textContent = isCard ? t('failedCard') : t('failedCash');
      } else {
        title.textContent = t('thankYou');
        text.textContent = isCash ? t('processingOrder') : t('processingPayment');
      }

      document.title = title.textContent || 'Thank you';
    })();
  </script>
</body>
</html>
