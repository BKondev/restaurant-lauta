<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Проследяване на поръчка - BOJOLE</title>
    <link rel="stylesheet" href="styles.css?v=20260204a">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            min-height: 100vh;
        }

        .track-wrap {
            max-width: 900px;
            margin: 18px auto 40px;
            padding: 0 16px;
        }

        .track-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: var(--highlight-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .success-icon i {
            font-size: 40px;
            color: white;
        }

        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 16px;
        }

        .order-info {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin: 25px 0;
        }

        .items-info {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
        }

        .items-title {
            color: #333;
            font-size: 16px;
            font-weight: 700;
            margin: 0 0 10px;
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid #dee2e6;
        }

        .item-row:last-child {
            border-bottom: none;
        }

        .item-name {
            font-weight: 700;
            color: #333;
        }

        .item-sub {
            color: #666;
            font-size: 13px;
            margin-top: 2px;
        }

        .item-note {
            color: var(--highlight-color);
            font-size: 13px;
            margin-top: 6px;
            white-space: pre-line;
            font-weight: 800;
        }

        .order-note-box {
            margin-top: 12px;
            padding: 12px;
            border-radius: 12px;
            background: #fff5f5;
            border: 1px solid #f0b4b4;
        }

        .order-note-title {
            font-weight: 900;
            color: var(--highlight-color);
            margin-bottom: 6px;
        }

        .order-note-text {
            color: var(--highlight-color);
            font-weight: 800;
            white-space: pre-line;
        }

        .item-price {
            font-weight: 800;
            color: #111;
            white-space: nowrap;
        }

        .order-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #dee2e6;
        }

        .order-row:last-child {
            border-bottom: none;
        }

        .order-label {
            color: #666;
            font-size: 14px;
            font-weight: 500;
        }

        .order-value {
            color: #333;
            font-size: 16px;
            font-weight: 600;
        }

        .order-id {
            font-size: 14px;
            color: var(--highlight-color);
            font-weight: bold;
            max-width: 65%;
            text-align: right;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .status-container {
            background: var(--top-bar-color);
            color: white;
            padding: 25px;
            border-radius: 12px;
            margin: 20px 0;
            text-align: center;
        }

        .status-text {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .time-remaining {
            font-size: 36px;
            font-weight: bold;
            margin: 15px 0;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .estimated-time {
            font-size: 14px;
            opacity: 0.9;
        }

        .progress-bar-container {
            background: rgba(255, 255, 255, 0.3);
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 15px;
        }

        .progress-bar {
            height: 100%;
            background: var(--highlight-color);
            border-radius: 4px;
            transition: width 1s linear;
        }

        .actions {
            margin-top: 30px;
            display: flex;
            gap: 15px;
        }

        .btn {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-primary {
            background: var(--highlight-color);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            filter: brightness(0.95);
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e9ecef;
        }

        .error-container {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }

        .error-title {
            color: #856404;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .error-message {
            color: #856404;
            font-size: 14px;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--highlight-color);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .delivery-info {
            background: rgba(0, 0, 0, 0.04);
            border-left: 4px solid var(--highlight-color);
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }

        .delivery-info i {
            color: var(--highlight-color);
            margin-right: 8px;
        }

        .stepper {
            background: #fff;
            border: 1px solid #eee;
            border-radius: 12px;
            padding: 18px;
            margin: 20px 0;
        }

        .steps {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .step {
            position: relative;
            text-align: center;
            padding: 10px 8px 6px;
        }

        .step::after {
            content: '';
            position: absolute;
            top: 26px;
            left: 50%;
            width: 100%;
            height: 4px;
            background: #e9ecef;
            z-index: 0;
        }

        .step:last-child::after {
            display: none;
        }

        .step-icon {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            margin: 0 auto 8px;
            background: #e9ecef;
            color: #6c757d;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
            transition: transform 0.25s ease, background 0.25s ease, color 0.25s ease;
        }

        .step-label {
            font-size: 12px;
            color: #666;
            font-weight: 600;
        }

        .step.active .step-icon {
            background: var(--highlight-color);
            color: #fff;
            transform: scale(1.05);
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.12);
        }

        .step.done .step-icon {
            background: var(--top-bar-color);
            color: #fff;
        }

        .step.done::after {
            background: var(--top-bar-color);
        }

        .step.active::after {
            background: var(--highlight-color);
        }

        .stepper-hint {
            margin-top: 10px;
            color: #666;
            font-size: 13px;
        }

        @media (max-width: 600px) {
            .track-card {
                padding: 25px;
            }

            h1 {
                font-size: 24px;
            }

            .time-remaining {
                font-size: 28px;
            }

            .actions {
                flex-direction: column;
            }
        }

        /* Ensure top-bar logo matches site (white + clickable) */
        .top-bar a.logo {
            color: inherit;
            text-decoration: none;
        }

        .top-bar .logo h1 {
            color: white;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="container" style="display:flex; align-items:center; justify-content:space-between;">
            <a id="top-logo-link" class="logo" href="#"><h1 style="margin:0;">BOJOLE</h1></a>
            <div></div>
        </div>
    </div>

    <main class="track-wrap">
        <div class="track-card" id="app">
            <div class="loading">
                <div class="spinner"></div>
                <p>Зареждане на поръчка...</p>
            </div>
        </div>
    </main>

    <script>
        function getBasePath() {
            try {
                const path = (window.location.pathname || '').toString();
                // '/track-order.html' -> ''
                // '/some/base/track-order.html' -> '/some/base'
                const dir = path.replace(/\/[^/]*$/, '');
                return dir === '/' ? '' : dir;
            } catch (e) {
                return '';
            }
        }

        const BASE_PATH = getBasePath();

        function normalizeBasePath(p) {
            const s = (p || '').toString().trim();
            if (!s || s === '/') return '';
            return s.endsWith('/') ? s.slice(0, -1) : s;
        }

        async function resolveApiBasePath() {
            // Server default BASE_PATH is usually '/resturant-website'.
            const candidates = [
                normalizeBasePath(BASE_PATH),
                '/resturant-website',
                ''
            ];

            const unique = Array.from(new Set(candidates));

            for (const base of unique) {
                const api = `${base}/api`;
                try {
                    const resp = await fetch(`${api}/settings/site`, { cache: 'no-store' });
                    if (resp.ok) {
                        return { basePath: base, apiUrl: api };
                    }
                } catch (e) {
                    // try next
                }
            }

            const fallbackBase = normalizeBasePath(BASE_PATH);
            return { basePath: fallbackBase, apiUrl: `${fallbackBase}/api` };
        }

        let PUBLIC_BASE_PATH = BASE_PATH;
        let API_URL = `${BASE_PATH}/api`;

        function setLogoHref() {
            try {
                const logoLink = document.getElementById('top-logo-link');
                if (logoLink) logoLink.setAttribute('href', `${PUBLIC_BASE_PATH}/`);
            } catch (e) {}
        }

        // Top-bar logo should lead to menu
        setLogoHref();

        const LANGUAGE_STORAGE_KEY = 'language';
        const LANGUAGE_USER_SELECTED_KEY = 'language_user_selected_v1';
        
        let updateInterval = null;
        let order = null;
        let startTime = null;

        let siteSettings = null;
        let eurToBgnRate = null;

        function getInitialLanguage() {
            try {
                const stored = (localStorage.getItem(LANGUAGE_STORAGE_KEY) || '').toString().trim().toLowerCase();
                const storedValid = (stored === 'en' || stored === 'bg') ? stored : '';
                const userSelected = localStorage.getItem(LANGUAGE_USER_SELECTED_KEY) === '1';
                if (!userSelected) return 'bg';
                return storedValid || 'bg';
            } catch (e) {
                return 'bg';
            }
        }

        const LANG = getInitialLanguage();
        document.documentElement.lang = LANG;

        const I18N = {
            en: {
                loading: 'Loading order...',
                thanks: 'Thank you for your order!',
                cancelledTitle: 'Order cancelled',
                cancelledSubtitle: 'For more information, contact the restaurant.',
                okSubtitle: 'Your order was received successfully',
                statusHeaderEta: 'Estimated time to complete:',
                statusHeaderReady: 'Your order is ready!',
                scheduledFor: 'Scheduled for:',
                approx: 'Approximately',
                minutes: 'minutes',
                orderNo: 'Order number:',
                status: 'Status:',
                type: 'Type:',
                total: 'Total:',
                delivery: '🚚 Delivery',
                pickup: '🛍 Pickup',
                pickupLater: 'Pickup later',
                deliveryLater: 'Delivery later',
                deliveryAddress: 'Delivery address:',
                pickupAddress: 'Pickup address:',
                phone: 'Phone:',
                received: 'Received',
                approved: 'Approved',
                finished: 'Finished',
                done: 'Done',
                status_pending: 'Order received',
                status_approved: 'Order approved',
                status_delivering: 'Out for delivery',
                status_ready_for_pickup: 'Ready for pickup',
                status_completed: 'Order completed',
                status_cancelled: 'Order cancelled',
                status_default: 'In progress',
                itemsTitle: 'Ordered items',
                promo: 'Promo',
                subtotal: 'Subtotal',
                discount: 'Discount',
                deliveryFee: 'Delivery fee',
                savings: 'You saved',
                orderNote: 'Order note',
                home: 'Home',
                newOrder: 'New order',
                callRestaurant: 'Call restaurant',
                error: 'Error',
                errorLoadTitle: 'Could not load the order',
                errorMissingId: 'Order number is missing.',
                errorGeneric: 'An error occurred while loading the order.',
                expiredTitle: 'Tracking expired',
                expiredLead: 'The tracking link is no longer active',
                expiredBody: 'You can track your order only within 2 hours after it is created. For more information, please contact the restaurant.',
                backHome: 'Back to home'
            },
            bg: {
                loading: 'Зареждане на поръчка...',
                thanks: 'Благодарим за поръчката!',
                cancelledTitle: 'Поръчката е отказана',
                cancelledSubtitle: 'За повече информация, свържете се с ресторанта.',
                okSubtitle: 'Вашата поръчка беше приета успешно',
                statusHeaderEta: 'Очаквано време за изпълнение:',
                statusHeaderReady: 'Вашата поръчка е готова!',
                scheduledFor: 'Планирано за:',
                approx: 'Приблизително',
                minutes: 'минути',
                orderNo: 'Номер на поръчка:',
                status: 'Статус:',
                type: 'Тип:',
                total: 'Обща сума:',
                delivery: '🚚 Доставка',
                pickup: '🛍 Вземане от място',
                pickupLater: 'За взимане по-късно',
                deliveryLater: 'Доставка за по-късно',
                deliveryAddress: 'Адрес за доставка:',
                pickupAddress: 'Адрес за взимане:',
                phone: 'Телефон:',
                received: 'Получена',
                approved: 'Одобрена',
                finished: 'Завършено',
                done: 'Готово',
                status_pending: 'Поръчката е получена',
                status_approved: 'Поръчката е одобрена',
                status_delivering: 'Поръчката е за доставка',
                status_ready_for_pickup: 'Поръчката е готова за взимане',
                status_completed: 'Поръчката е завършена',
                status_cancelled: 'Поръчката е отказана',
                status_default: 'В процес на изпълнение',
                itemsTitle: 'Поръчани продукти',
                promo: 'Промо',
                subtotal: 'Сума',
                discount: 'Отстъпка',
                deliveryFee: 'Доставка',
                savings: 'Спестявате',
                orderNote: 'Бележка към поръчката',
                home: 'Начало',
                newOrder: 'Нова поръчка',
                callRestaurant: 'Обади се на ресторанта',
                error: 'Грешка',
                errorLoadTitle: 'Не можахме да заредим поръчката',
                errorMissingId: 'Не е посочен номер на поръчка.',
                errorGeneric: 'Възникна грешка при зареждане на поръчката.',
                expiredTitle: 'Проследяването изтече',
                expiredLead: 'Линкът за проследяване не е повече активен',
                expiredBody: 'Можете да проследявате вашата поръчка само в рамките на 2 часа след създаването ѝ. За повече информация, моля свържете се с ресторанта.',
                backHome: 'Обратно към началото'
            }
        };

        function t(key) {
            return (I18N[LANG] && I18N[LANG][key]) || (I18N.en && I18N.en[key]) || key;
        }

        function toNumber(val) {
            const n = Number(val);
            return Number.isFinite(n) ? n : 0;
        }

        function round2(val) {
            const n = toNumber(val);
            return Math.round((n + Number.EPSILON) * 100) / 100;
        }

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function convertBgnToEur(amountBgn) {
            const rate = toNumber(eurToBgnRate);
            if (rate > 0) return toNumber(amountBgn) / rate;
            // Fallback: assume already in EUR if rate missing
            return toNumber(amountBgn);
        }

        function formatMoney(amount, currency) {
            const cur = (currency || '').toString().trim().toUpperCase();
            if (cur === 'BGN') return `${round2(convertBgnToEur(amount)).toFixed(2)} €`;
            return `${round2(amount).toFixed(2)} €`;
        }

        // Get order ID from URL
        function getOrderId() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('id');
        }

        async function fetchSiteSettings() {
            try {
                const response = await fetch(`${API_URL}/settings/site`);
                if (!response.ok) return null;
                return await response.json();
            } catch (e) {
                return null;
            }
        }

        async function fetchCurrencySettings() {
            try {
                const response = await fetch(`${API_URL}/settings/currency`);
                if (!response.ok) return null;
                return await response.json();
            } catch (e) {
                return null;
            }
        }

        // Fetch order details
        async function fetchOrderDetails(orderId) {
            try {
                const response = await fetch(`${API_URL}/orders/track/${orderId}`);
                
                if (response.status === 410) {
                    // Order tracking expired (2 hours passed)
                    return { expired: true };
                }

                if (!response.ok) {
                    let details = '';
                    try {
                        details = (await response.text() || '').toString().slice(0, 200);
                    } catch (e) {}
                    throw new Error(`Failed to fetch order (HTTP ${response.status}${details ? `: ${details}` : ''})`);
                }

                const data = await response.json();
                return data;
            } catch (error) {
                console.error('Error fetching order:', error);
                return { error: true, message: error.message };
            }
        }

        // Calculate time remaining
        function calculateTimeRemaining(createdAt, estimatedMinutes) {
            if (!estimatedMinutes) estimatedMinutes = 60; // Default

            const created = new Date(createdAt);
            const now = new Date();
            const estimatedCompletion = new Date(created.getTime() + estimatedMinutes * 60000);
            const remaining = estimatedCompletion - now;

            if (remaining <= 0) {
                return { minutes: 0, seconds: 0, total: 0 };
            }

            const minutes = Math.floor(remaining / 60000);
            const seconds = Math.floor((remaining % 60000) / 1000);

            return { minutes, seconds, total: remaining };
        }

        // Format time
        function formatTime(minutes, seconds) {
            return `${minutes}:${seconds.toString().padStart(2, '0')}`;
        }

        // Render order tracking page
        function renderOrderTracking(orderData) {
            if (updateInterval) {
                clearInterval(updateInterval);
                updateInterval = null;
            }

            order = orderData;
            startTime = new Date(order.createdAt);

            const orderTime = (order.orderTime || '').toString().toLowerCase();
            // Be tolerant: some older/newer orders may not store orderTime consistently,
            // but scheduledTime being present means the customer chose "later".
            const scheduledTime = (
                order.scheduledTime ??
                order.scheduled_time ??
                order.scheduleTime ??
                order.scheduledAt
            );
            const scheduledTimeText = (scheduledTime || '').toString().trim();
            const isLater = orderTime === 'later' || !!scheduledTimeText;

            const timeRemaining = isLater ? null : calculateTimeRemaining(order.createdAt, order.estimatedTime);
            const totalEstimatedMs = (order.estimatedTime || 60) * 60000;
            const elapsedMs = Date.now() - startTime.getTime();
            const progressPercent = Math.min(100, (elapsedMs / totalEstimatedMs) * 100);

            function normalizeStatus(s) {
                const v = (s || '').toString();
                return v === 'confirmed' ? 'approved' : v;
            }

            const normalizedStatus = normalizeStatus(order.status);

            const currency = order.currency || 'EUR';
            const promoCode = (order.promoCode || '').toString().trim();
            const discountPct = Math.max(0, Math.min(100, toNumber(order.discount)));
            const subtotal = toNumber(order.subtotal);
            const discountAmount = toNumber(order.discountAmount);
            const deliveryFee = toNumber(order.deliveryFee);
            const orderNote = (order.orderNote || '').toString().replace(/\r/g, '').trim();

            const statusText = normalizedStatus === 'pending'
                ? t('status_pending')
                : normalizedStatus === 'approved'
                    ? t('status_approved')
                    : normalizedStatus === 'delivering'
                        ? t('status_delivering')
                        : normalizedStatus === 'ready_for_pickup'
                            ? t('status_ready_for_pickup')
                            : normalizedStatus === 'completed'
                                ? t('status_completed')
                                : normalizedStatus === 'cancelled'
                                    ? t('status_cancelled')
                                    : t('status_default');

            function getStepIndex() {
                // Step index: 0 received, 1 approved, 2 finished
                if (normalizedStatus === 'cancelled') return -1;
                if (normalizedStatus === 'pending') return 0;
                if (normalizedStatus === 'approved') return 1;
                if (normalizedStatus === 'completed') return 2;
                // Any other in-progress state maps to "approved" step
                return 1;
            }

            const stepIdx = getStepIndex();
            const isDelivery = order.deliveryMethod === 'delivery';
            const laterLabel = isDelivery ? t('deliveryLater') : t('pickupLater');

            const contactsPhone = (siteSettings && siteSettings.footer && siteSettings.footer.contacts && siteSettings.footer.contacts.phone) ? String(siteSettings.footer.contacts.phone).trim() : '';
            const contactsAddress = (siteSettings && siteSettings.footer && siteSettings.footer.contacts && siteSettings.footer.contacts.address) ? String(siteSettings.footer.contacts.address).trim() : '';
            const contactsMapsUrl = (siteSettings && siteSettings.footer && siteSettings.footer.contacts && siteSettings.footer.contacts.addressMapsUrl) ? String(siteSettings.footer.contacts.addressMapsUrl).trim() : '';
            const pickupMapsUrl = contactsMapsUrl || (contactsAddress ? `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(contactsAddress)}` : '');

            const pickupLocationHtml = (!isDelivery && contactsAddress) ? `
                <div class="delivery-info" style="margin-top: 14px;">
                    <i class="fas fa-map-marker-alt"></i>
                    <strong>${t('pickupAddress')}</strong><br>
                    ${pickupMapsUrl ? `<a href="${pickupMapsUrl}" target="_blank" rel="noopener noreferrer" style="color: var(--highlight-color); font-weight: 800; text-decoration: none;">${contactsAddress}</a>` : contactsAddress}
                </div>
            ` : '';

            const stepperHtml = `
                <div class="stepper">
                    <div class="steps">
                        <div class="step ${stepIdx > 0 ? 'done' : (stepIdx === 0 ? 'active' : '')}">
                            <div class="step-icon"><i class="fas fa-inbox"></i></div>
                            <div class="step-label">${t('received')}</div>
                        </div>
                        <div class="step ${stepIdx > 1 ? 'done' : (stepIdx === 1 ? 'active' : '')}">
                            <div class="step-icon"><i class="fas fa-check"></i></div>
                            <div class="step-label">${t('approved')}</div>
                        </div>
                        <div class="step ${stepIdx === 2 ? 'done active' : ''}">
                            <div class="step-icon"><i class="fas fa-check-circle"></i></div>
                            <div class="step-label">${t('finished')}</div>
                        </div>
                    </div>
                    <div class="stepper-hint">${statusText}</div>
                </div>
            `;

            const items = Array.isArray(order.items) ? order.items : [];
            const itemsHtml = `
                <div class="items-info">
                    <div class="items-title">${t('itemsTitle')}</div>
                    ${items.length ? items.map((it) => {
                        const name = escapeHtml((it && it.name) ? String(it.name) : '');
                        const note = ((it && (it.note || it.notes)) ? String(it.note || it.notes) : '').replace(/\r/g, '').trim();
                        const noteHtml = note ? `<div class="item-note">${escapeHtml(note)}</div>` : '';
                        const qty = toNumber(it && it.quantity);
                        const price = toNumber(it && it.price);
                        const originalPrice = Number(it && it.originalPrice);
                        const hasDiscount = Number.isFinite(originalPrice) && originalPrice > price;
                        const promoLabel = ((it && (it.discountLabel || it.discount_label)) ? String(it.discountLabel || it.discount_label) : '').replace(/\r/g, '').trim();
                        const line = price * qty;

                        const unitHtml = hasDiscount
                            ? `<span style="text-decoration: line-through; opacity: .75; margin-right: 6px;">${formatMoney(originalPrice, currency)}</span><strong>${formatMoney(price, currency)}</strong>`
                            : `${formatMoney(price, currency)}`;
                        return `
                            <div class="item-row">
                                <div>
                                    <div class="item-name">${name}</div>
                                    <div class="item-sub">${qty} × ${unitHtml}</div>
                                    ${(promoLabel || hasDiscount) ? `<div class="item-sub"><strong>${escapeHtml(promoLabel || 'Promo')}</strong></div>` : ''}
                                    ${noteHtml}
                                </div>
                                <div class="item-price">${formatMoney(line, currency)}</div>
                            </div>
                        `;
                    }).join('') : `
                        <div class="item-row">
                            <div class="item-name">(Няма артикули)</div>
                            <div class="item-price">—</div>
                        </div>
                    `}

                    ${(promoCode || discountAmount > 0) ? `
                        <div class="item-row">
                            <div class="item-name">${t('promo')}</div>
                            <div class="item-price">${promoCode ? `${escapeHtml(promoCode)}${discountPct ? ` (-${escapeHtml(discountPct)}%)` : ''}` : (discountPct ? `-${escapeHtml(discountPct)}%` : '—')}</div>
                        </div>
                    ` : ''}
                    ${(subtotal > 0) ? `
                        <div class="item-row">
                            <div class="item-name">${t('subtotal')}</div>
                            <div class="item-price">${formatMoney(subtotal, currency)}</div>
                        </div>
                    ` : ''}
                    ${(discountAmount > 0) ? `
                        <div class="item-row">
                            <div class="item-name">${t('discount')}</div>
                            <div class="item-price">-${formatMoney(discountAmount, currency)}</div>
                        </div>
                    ` : ''}
                    ${(deliveryFee > 0) ? `
                        <div class="item-row">
                            <div class="item-name">${t('deliveryFee')}</div>
                            <div class="item-price">${formatMoney(deliveryFee, currency)}</div>
                        </div>
                    ` : ''}
                    <div class="item-row">
                        <div class="item-name">${t('total')}</div>
                        <div class="item-price">${formatMoney(order.total, currency)}</div>
                    </div>

                    ${orderNote ? `
                        <div class="order-note-box">
                            <div class="order-note-title">${t('orderNote')}</div>
                            <div class="order-note-text">${escapeHtml(orderNote)}</div>
                        </div>
                    ` : ''}
                </div>
            `;

            const html = `
                <div class="header">
                    <div class="success-icon" style="background: ${normalizedStatus === 'cancelled' ? '#f44336' : (normalizedStatus === 'completed' ? '#4caf50' : '#667eea')};">
                        <i class="fas ${normalizedStatus === 'cancelled' ? 'fa-times' : (normalizedStatus === 'completed' ? 'fa-check' : 'fa-receipt')}"></i>
                    </div>
                    <h1>${normalizedStatus === 'cancelled' ? t('cancelledTitle') : t('thanks')}</h1>
                    <p class="subtitle">${normalizedStatus === 'cancelled' ? t('cancelledSubtitle') : t('okSubtitle')}</p>
                </div>

                ${pickupLocationHtml}
                ${stepperHtml}

                <div class="status-container">
                    <div class="status-text">
                        ${normalizedStatus === 'cancelled' ? t('status_cancelled') : (isLater ? laterLabel : ((timeRemaining && timeRemaining.total > 0) ? t('statusHeaderEta') : t('statusHeaderReady')))}
                    </div>
                    <div class="time-remaining" id="time-display">
                        ${normalizedStatus === 'cancelled' ? '--:--' : (isLater ? (scheduledTimeText || '--:--') : ((timeRemaining && timeRemaining.total > 0) ? formatTime(timeRemaining.minutes, timeRemaining.seconds) : t('done')))}
                    </div>
                    <div class="estimated-time">
                        ${normalizedStatus === 'cancelled' ? '' : (isLater ? '' : (order.estimatedTime ? `${t('approx')} ${order.estimatedTime} ${t('minutes')}` : `${t('approx')} 60 ${t('minutes')}`))}
                    </div>
                    ${isLater ? '' : `
                        <div class="progress-bar-container">
                            <div class="progress-bar" id="progress-bar" style="width: ${progressPercent}%"></div>
                        </div>
                    `}
                </div>

                ${itemsHtml}

                <div class="order-info">
                    <div class="order-row">
                        <span class="order-label">${t('orderNo')}</span>
                        <span class="order-id">#${escapeHtml(order.id)}</span>
                    </div>
                    <div class="order-row">
                        <span class="order-label">${t('status')}</span>
                        <span class="order-value">${statusText}</span>
                    </div>
                    <div class="order-row">
                        <span class="order-label">${t('type')}</span>
                        <span class="order-value">
                            ${order.deliveryMethod === 'delivery' ? t('delivery') : t('pickup')}
                        </span>
                    </div>
                    <div class="order-row">
                        <span class="order-label">${t('total')}</span>
                        <span class="order-value">${formatMoney(order.total, currency)}</span>
                    </div>
                    ${(promoCode || discountAmount > 0) ? `
                        <div class="order-row">
                            <span class="order-label">${t('promo')}</span>
                            <span class="order-value">${promoCode ? `${escapeHtml(promoCode)}${discountPct ? ` (-${escapeHtml(discountPct)}%)` : ''}` : (discountPct ? `-${escapeHtml(discountPct)}%` : '—')}</span>
                        </div>
                    ` : ''}
                    ${contactsPhone ? `
                        <div class="order-row">
                            <span class="order-label">${t('phone')}</span>
                            <span class="order-value"><a href="tel:${encodeURIComponent(contactsPhone)}" style="color: var(--highlight-color); font-weight: 800; text-decoration: none;">${contactsPhone}</a></span>
                        </div>
                    ` : ''}
                </div>

                ${order.deliveryMethod === 'delivery' && order.customerInfo ? `
                    <div class="delivery-info">
                        <i class="fas fa-map-marker-alt"></i>
                        <strong>${t('deliveryAddress')}</strong><br>
                        ${escapeHtml(order.customerInfo.address)}, ${escapeHtml(order.customerInfo.city)}
                    </div>
                ` : ''}

                <div class="actions">
                    <a href="${BASE_PATH}/" class="btn btn-secondary">
                        <i class="fas fa-home"></i> ${t('home')}
                    </a>
                    ${contactsPhone ? `
                        <a href="tel:${encodeURIComponent(contactsPhone)}" class="btn btn-secondary">
                            <i class="fas fa-phone"></i> ${t('callRestaurant')}
                        </a>
                    ` : ''}
                    <a href="${BASE_PATH}/" class="btn btn-primary">
                        <i class="fas fa-utensils"></i> ${t('newOrder')}
                    </a>
                </div>
            `;

            document.getElementById('app').innerHTML = html;

            // Start countdown (not for scheduled orders)
            if (!isLater && normalizedStatus !== 'cancelled' && timeRemaining && timeRemaining.total > 0) {
                updateInterval = setInterval(updateCountdown, 1000);
            }
        }

        // Update countdown
        function updateCountdown() {
            if (!order) return;

            const orderTime = (order.orderTime || '').toString().toLowerCase();
            const scheduledTime = (
                order.scheduledTime ??
                order.scheduled_time ??
                order.scheduleTime ??
                order.scheduledAt
            );
            const scheduledTimeText = (scheduledTime || '').toString().trim();
            if (orderTime === 'later' || scheduledTimeText) return;

            const timeRemaining = calculateTimeRemaining(order.createdAt, order.estimatedTime);
            const timeDisplay = document.getElementById('time-display');
            const progressBar = document.getElementById('progress-bar');

            if (timeDisplay) {
                if (timeRemaining.total > 0) {
                    timeDisplay.textContent = formatTime(timeRemaining.minutes, timeRemaining.seconds);

                    // Update progress bar
                    const totalEstimatedMs = (order.estimatedTime || 60) * 60000;
                    const elapsedMs = Date.now() - startTime.getTime();
                    const progressPercent = Math.min(100, (elapsedMs / totalEstimatedMs) * 100);
                    if (progressBar) {
                        progressBar.style.width = progressPercent + '%';
                    }
                } else {
                    timeDisplay.textContent = t('done');
                    if (progressBar) {
                        progressBar.style.width = '100%';
                    }
                    clearInterval(updateInterval);
                }
            }
        }

        // Render error
        function renderError(message) {
            const html = `
                <div class="header">
                    <div class="success-icon" style="background: #f44336;">
                        <i class="fas fa-exclamation-triangle"></i>
                    </div>
                    <h1>${t('error')}</h1>
                </div>

                <div class="error-container">
                    <div class="error-title">${t('errorLoadTitle')}</div>
                    <div class="error-message">${message}</div>
                </div>

                <div class="actions">
                    <a href="${BASE_PATH}/" class="btn btn-primary" style="flex: initial; width: 100%;">
                        <i class="fas fa-home"></i> ${t('backHome')}
                    </a>
                </div>
            `;

            document.getElementById('app').innerHTML = html;
        }

        // Render expired
        function renderExpired() {
            const html = `
                <div class="header">
                    <div class="success-icon" style="background: #ff9800;">
                        <i class="fas fa-clock"></i>
                    </div>
                    <h1>${t('expiredTitle')}</h1>
                </div>

                <div class="error-container">
                    <div class="error-title">${t('expiredLead')}</div>
                    <div class="error-message">
                        ${t('expiredBody')}
                    </div>
                </div>

                <div class="actions">
                    <a href="${BASE_PATH}/" class="btn btn-primary" style="flex: initial; width: 100%;">
                        <i class="fas fa-home"></i> ${t('backHome')}
                    </a>
                </div>
            `;

            document.getElementById('app').innerHTML = html;
        }

        // Initialize
        async function init() {
            const orderId = getOrderId();

            // Resolve the correct API base path (handles nginx/base-path changes)
            const resolved = await resolveApiBasePath();
            PUBLIC_BASE_PATH = resolved.basePath;
            API_URL = resolved.apiUrl;
            setLogoHref();

            // Update initial loading text
            try {
                const loadingP = document.querySelector('.loading p');
                if (loadingP) loadingP.textContent = t('loading');
                document.title = (LANG === 'bg') ? 'Проследяване на поръчка - BOJOLE' : 'Track order - BOJOLE';
            } catch (e) {}

            if (!orderId) {
                renderError(t('errorMissingId'));
                return;
            }

            // Fetch public settings (best-effort)
            const [s, c] = await Promise.all([fetchSiteSettings(), fetchCurrencySettings()]);
            siteSettings = s;
            eurToBgnRate = c && (c.eurToBgnRate != null ? c.eurToBgnRate : null);

            const result = await fetchOrderDetails(orderId);

            if (result.expired) {
                renderExpired();
            } else if (result.error) {
                renderError(result.message || t('errorGeneric'));
            } else if (result.order) {
                renderOrderTracking(result.order);

                // Auto-refresh order status every 30 seconds
                setInterval(async () => {
                    const updated = await fetchOrderDetails(orderId);
                    if (updated.order && !updated.error && !updated.expired) {
                        // Update status silently
                        order = Object.assign({}, order, updated.order);
                        renderOrderTracking(order);
                    }
                }, 30000);
            } else {
                renderError(t('errorLoadTitle'));
            }
        }

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (updateInterval) {
                clearInterval(updateInterval);
            }
        });

        // Start
        init();
    </script>
</body>
</html>
