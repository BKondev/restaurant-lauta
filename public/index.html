<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Restaurant Menu - Template</title>
    <link rel="stylesheet" href="styles.css?v=20251211012">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Top Bar -->
    <div class="top-bar">
        <div class="container">
            <div class="logo" onclick="window.location.reload();" style="cursor: pointer;">
                <img id="restaurant-logo" class="restaurant-logo" src="" alt="Logo">
                <h1 id="restaurant-name">Restaurant Name</h1>
            </div>
            <div class="search-bar-top">
                <div class="search-container" id="search-container">
                    <input type="text" id="search-input" placeholder="Search for dishes..." data-i18n-placeholder="searchPlaceholder" autocomplete="off">
                    <i class="fas fa-search search-icon-desktop"></i>
                    <button class="close-search-mobile" onclick="closeMobileSearch()">
                        <i class="fas fa-times"></i>
                    </button>
                    <div class="search-results-dropdown" id="search-results"></div>
                </div>
            </div>
            <div class="top-actions">
                <button class="search-toggle-mobile" id="search-toggle-btn" onclick="toggleMobileSearch()">
                    <i class="fas fa-search"></i>
                </button>
                <div class="language-switcher">
                    <button class="lang-btn active" data-lang="en" onclick="switchLanguage('en')" title="English">
                        EN
                    </button>
                    <button class="lang-btn" data-lang="bg" onclick="switchLanguage('bg')" title="Български">
                        BG
                    </button>
                    <select class="lang-dropdown" id="lang-dropdown" onchange="switchLanguage(this.value)">
                        <option value="en">EN</option>
                        <option value="bg">BG</option>
                    </select>
                </div>
                <a href="checkout" class="cart-button" id="cart-button">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-badge" id="cart-count">0</span>
                </a>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-container">
        <!-- Sidebar Categories -->
        <aside class="sidebar">
            <div class="categories-header">
                <h2 data-i18n="categories">Menu Categories</h2>
            </div>
            <nav class="categories-nav" id="categories-nav">
                <!-- Categories will be dynamically loaded here -->
            </nav>
        </aside>

        <!-- Menu Content -->
        <div class="content">
            <!-- Promotional Slideshow Banner -->
            <div id="promo-slideshow" class="promo-slideshow" style="display: none;">
                <div class="slideshow-container">
                    <div class="slides-wrapper" id="slides-wrapper">
                        <!-- Slides will be dynamically loaded here -->
                    </div>
                    <button class="slide-nav prev" onclick="changeSlide(-1)">❮</button>
                    <button class="slide-nav next" onclick="changeSlide(1)">❯</button>
                    <div class="slide-dots" id="slide-dots"></div>
                </div>
            </div>
            
            <!-- Products Container -->
            <div id="products-container">
                <!-- Products will be dynamically loaded here -->
            </div>

            <!-- Empty State -->
            <div id="empty-state" class="empty-state" style="display: none;">
                <i class="fas fa-utensils"></i>
                <p>No items found</p>
            </div>
        </main>
    </div>

    <!-- Product Modal -->
    <div id="product-modal" class="modal">
        <div class="product-modal-shell" role="dialog" aria-modal="true" aria-labelledby="modal-name">
            <button type="button" class="modal-close-circle" id="modal-close-btn" aria-label="Close">
                <i class="fas fa-times"></i>
            </button>
            <div class="modal-content product-modal-content">
                <div class="product-modal-inner">
                    <h2 id="modal-name" class="product-modal-name"></h2>
                    <div id="modal-qty-line" class="product-modal-qtyline"></div>
                    <div id="modal-big-price" class="product-modal-bigprice"></div>
                    <p id="modal-description" class="product-modal-description"></p>
                    <div class="product-modal-image-wrap">
                        <img id="modal-image" class="product-modal-image" src="" alt="">
                        <div id="modal-weight" class="product-modal-weight product-modal-weight-overlay" style="display:none;"></div>
                    </div>
                </div>

                <div class="product-modal-footer">
                    <div class="product-modal-qty-controls" aria-label="Quantity controls">
                        <button type="button" class="qty-btn" id="modal-qty-minus" aria-label="Decrease quantity">-</button>
                        <span class="qty-display" id="modal-qty-display">1</span>
                        <button type="button" class="qty-btn" id="modal-qty-plus" aria-label="Increase quantity">+</button>
                    </div>
                    <button class="add-to-cart-btn" id="modal-add-to-cart">
                        <i class="fas fa-shopping-cart"></i> Add to Cart
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js?v=20251211002"></script>
</body>
</html>
