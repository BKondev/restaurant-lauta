<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Privacy Policy</title>
    <link rel="stylesheet" href="styles.css?v=20260204a" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body>
    <div class="container" style="padding: 24px 16px; max-width: 900px; margin: 0 auto;">
        <a href="./" style="display: inline-block; margin-bottom: 12px;">← Back to menu</a>
        <h1 id="legal-title">Privacy Policy</h1>
        <div id="legal-content" data-page="privacy"></div>
    </div>

    <div id="site-map" class="site-map" style="display:none;"></div>
    <footer id="site-footer" class="site-footer"></footer>

    <script src="legal.js?v=20260127a"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // optional footer render: reuse same public settings API
        (async function () {
            try {
                const res = await fetch('api/settings/site');
                if (!res.ok) return;
                const s = await res.json();

                // map (above footer)
                try {
                    const mapEl = document.getElementById('site-map');
                    const mapCfg = s?.map || {};
                    const enabled = !!mapCfg.enabled;
                    const lat = typeof mapCfg.lat === 'number' ? mapCfg.lat : parseFloat(mapCfg.lat);
                    const lng = typeof mapCfg.lng === 'number' ? mapCfg.lng : parseFloat(mapCfg.lng);
                    const zoom = Number.isFinite(Number(mapCfg.zoom)) ? Math.max(1, Math.min(19, Math.round(Number(mapCfg.zoom)))) : 16;
                    const label = (mapCfg.label || s?.footer?.contacts?.address || '').toString().trim();

                    if (mapEl && enabled && Number.isFinite(lat) && Number.isFinite(lng) && window.L) {
                        mapEl.style.display = 'block';
                        mapEl.innerHTML = '<div id="site-map-leaflet" style="width:100%;height:100%;"></div>';
                        const map = window.L.map('site-map-leaflet', { scrollWheelZoom: false });
                        map.setView([lat, lng], zoom);
                        window.L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                            maxZoom: 19,
                            attribution: '&copy; OpenStreetMap'
                        }).addTo(map);
                        const marker = window.L.marker([lat, lng]).addTo(map);
                        if (label) {
                            marker.bindTooltip(label, { permanent: true, direction: 'top', offset: [0, -10] });
                            marker.bindPopup(label);
                        }
                    }
                } catch (e) {}

                const footerEl = document.getElementById('site-footer');
                if (!footerEl) return;
                const contacts = (s && s.footer && s.footer.contacts) ? s.footer.contacts : {};
                const aboutText = ((s && s.footer && s.footer.aboutText) || '').toString().trim();
                const socials = Array.isArray(s && s.footer && s.footer.socials) ? s.footer.socials : [];

                const esc = (v) => (v ?? '').toString()
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;');

                const contactLines = [
                    contacts.phone ? `<li><strong>Phone:</strong> ${esc(contacts.phone)}</li>` : '',
                    contacts.email ? `<li><strong>Email:</strong> <a href="mailto:${encodeURIComponent(contacts.email)}">${esc(contacts.email)}</a></li>` : '',
                    contacts.address ? `<li><strong>Address:</strong> ${esc(contacts.address)}</li>` : ''
                ].filter(Boolean).join('');

                const socialLinks = socials
                    .filter(x => x && x.url)
                    .map(x => {
                        const label = (x.label || x.url).toString();
                        const icon = (x.iconClass || '').toString().trim();
                        const iconHtml = icon ? `<i class="${esc(icon)}"></i>` : '<i class="fas fa-link"></i>';
                        return `<a href="${esc(x.url)}" target="_blank" rel="noopener noreferrer">${iconHtml}<span>${esc(label)}</span></a>`;
                    })
                    .join('');

                footerEl.innerHTML = `
                    <div class="footer-inner">
                        <div class="footer-grid">
                            <div class="footer-col">
                                <h3>Contacts</h3>
                                <ul>${contactLines || '<li>—</li>'}</ul>
                            </div>
                            <div class="footer-col">
                                <h3>Information</h3>
                                <ul>
                                    <li><a href="privacy">Privacy Policy</a></li>
                                    <li><a href="terms">Terms &amp; Conditions</a></li>
                                </ul>
                            </div>
                            <div class="footer-col">
                                <h3>About</h3>
                                <p>${aboutText ? esc(aboutText) : '—'}</p>
                                ${socialLinks ? `<div class="footer-socials">${socialLinks}</div>` : ''}
                            </div>
                        </div>
                        <div class="footer-bottom">
                            <div>Powered by Crystal Automation &amp; Karakashkov</div>
                            <div>&copy; ${new Date().getFullYear()}</div>
                        </div>
                    </div>
                `;
            } catch (e) {}
        })();
    </script>
</body>
</html>
