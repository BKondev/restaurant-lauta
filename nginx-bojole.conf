# Nginx vhost for bojole.bg
# Goal:
# - Public URLs are at root: https://bojole.bg/, https://bojole.bg/checkout, etc.
# - Internally the Node app can still run with BASE_PATH=/resturant-website
# - Legacy URLs like /resturant-website/* continue to work
#
# Upstream: change port to match your PM2 instance
# Example assumes: node listens on 127.0.0.1:3004 and expects /resturant-website

server {
    listen 80;
    listen [::]:80;
    server_name bojole.bg www.bojole.bg;

    # Allow certbot http-01
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name bojole.bg www.bojole.bg;

    ssl_certificate /etc/letsencrypt/live/bojole.bg/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bojole.bg/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # 1) Legacy prefix must be handled explicitly to avoid double-prefixing.
    location ^~ /resturant-website/ {
        proxy_pass http://127.0.0.1:3004/resturant-website/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 1.5) Public /api -> internal /resturant-website/api
    # This prevents /api from being routed to another upstream by accident.
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:3004/resturant-website/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 2) Public root -> internal /resturant-website/
    location / {
        proxy_pass http://127.0.0.1:3004/resturant-website/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
